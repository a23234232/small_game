<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>枪战肉鸽 - 联机大厅</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      color: #fff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 10px;
      color: #4488ff;
      text-shadow: 0 0 20px rgba(68, 136, 255, 0.5);
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 40px;
    }
    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
    }
    .panel h2 {
      color: #44ff88;
      margin-bottom: 20px;
      font-size: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 15px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #4488ff;
    }
    .btn {
      background: linear-gradient(90deg, #4444ff, #6666ff);
      border: none;
      padding: 15px 30px;
      color: #fff;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    .btn:hover {
      background: linear-gradient(90deg, #6666ff, #8888ff);
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .room-list {
      max-height: 300px;
      overflow-y: auto;
    }
    .room-item {
      background: rgba(0,0,0,0.2);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    .room-item:hover {
      border-color: #4488ff;
      background: rgba(68, 136, 255, 0.1);
    }
    .room-info h3 {
      color: #44ff88;
      margin-bottom: 5px;
    }
    .room-info p {
      color: #888;
      font-size: 12px;
    }
    .room-players {
      color: #ffaa00;
      font-size: 14px;
    }
    .status-bar {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.connected { background: #44ff44; }
    .status-dot.disconnected { background: #ff4444; }
    .status-dot.hosting { background: #4488ff; }
    .player-color-picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .color-option {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s;
    }
    .color-option:hover { transform: scale(1.1); }
    .color-option.selected { border-color: #fff; }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    #gameFrame {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      z-index: 1000;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1001;
      width: auto;
      padding: 10px 20px;
      display: none;
    }
    .single-player-btn {
      margin-top: 20px;
      background: linear-gradient(90deg, #44ff44, #66ff66);
    }
    .single-player-btn:hover {
      background: linear-gradient(90deg, #66ff66, #88ff88);
    }
  </style>
  <script type="module" crossorigin src="./assets/config-DF2WWDFO.js"></script>
  <script type="module" crossorigin src="./assets/lobby-3w2DG4k9.js"></script>
</head>
<body>
  <div class="container">
    <h1>🔫 枪战肉鸽</h1>
    <p class="subtitle">Gunfight Roguelike - 局域网联机版</p>
    
    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">未连接</span>
      </div>
      <div id="playerInfo"></div>
    </div>
    
    <div class="panel">
      <h2>🎮 快速开始</h2>
      <div class="form-group">
        <label>玩家名称</label>
        <input type="text" id="playerName" placeholder="输入你的昵称" value="玩家 1">
      </div>
      <div class="form-group">
        <label>选择颜色</label>
        <div class="player-color-picker" id="colorPicker"></div>
      </div>
      <div class="form-group">
        <label>选择地图</label>
        <select id="mapSelect">
          <option value="0">开阔地</option>
          <option value="1">废墟</option>
          <option value="2">工厂</option>
          <option value="3">森林</option>
          <option value="4">沙漠</option>
          <option value="5">火山</option>
        </select>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="friendlyFire">
        <label for="friendlyFire">友军伤害</label>
      </div>
      <button class="btn single-player-btn" onclick="startSinglePlayer()">🎯 单机游戏</button>
      <button class="btn" id="createRoomBtn" onclick="createRoom()" style="margin-top: 10px;">🏠 创建房间</button>
    </div>
    
    <div class="panel">
      <h2>🌐 联机游戏</h2>
      <div class="form-group">
        <label>服务器地址</label>
        <input type="text" id="serverAddress" placeholder="localhost:8080" value="localhost:8080">
      </div>
      <button class="btn" id="connectBtn" onclick="connectToServer()">连接服务器</button>
    </div>
    
    <div class="panel" id="roomListPanel" style="display: none;">
      <h2>📋 房间列表</h2>
      <div class="room-list" id="roomList">
        <p style="color: #666; text-align: center;">点击"连接服务器"后显示房间列表</p>
      </div>
    </div>
  </div>
  
  <button class="btn back-btn" id="backBtn" onclick="backToLobby()">返回大厅</button>
  <div id="gameFrame"></div>
  
</body>
</html>
